# Single-host stack: Go backend + Next.js frontend on a shared bridge.
#
# ── Local dev (direct container access) ────────────────────────────────
#   docker compose up -d --build
#   # frontend → http://localhost:31778, backend → http://localhost:31777
#
# ── Public deployment (HTTPS via the bundled nginx) ────────────────────
#   1) Drop fullchain.pem + privkey.pem into ./nginx/certs/
#   2) Edit ./nginx/default.conf and uncomment the 443 server block
#      (and the http→https redirect in the :80 server).
#   3) In .env, set:
#        PUBLIC_DOMAIN=your.domain.example.com
#        BACKEND_BIND=127.0.0.1     # don't expose backend to the internet
#        FRONTEND_BIND=127.0.0.1    # don't expose frontend to the internet
#   4) make compose-up-proxy
#      # nginx listens on :80 and :443, proxies / → frontend, /api/* → backend
#
# nginx routes /api/* DIRECTLY to the Go backend instead of going through
# Next.js' /api rewrite. That removes one hop and is the main reason the
# old setup could surface HTTP 500 under load or large bodies.

name: opengovsupport

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    image: opengovsupport-backend:latest
    container_name: opengovsupport-backend
    restart: unless-stopped
    environment:
      PORT: "8080"
      # — runtime tuning (see src/backend/runtime/) —
      POOL_WORKERS: "${POOL_WORKERS:-8}"
      POOL_QUEUE: "${POOL_QUEUE:-4096}"
      POOL_FAST_THRESHOLD: "${POOL_FAST_THRESHOLD:-4096}"
      GOGC_TARGET: "${GOGC_TARGET:-300}"
      GOMAXPROCS: "${GOMAXPROCS:-0}"   # 0 = use container's CPU quota
      JSON_INDENT: "${JSON_INDENT:-0}" # set to "1" in dev for readable JSON
    expose:
      - "8080"
    # Bind address is configurable. Default 0.0.0.0 keeps existing dev
    # behavior; for production behind nginx, set BACKEND_BIND=127.0.0.1
    # in .env so only the proxy can reach the backend.
    ports:
      - "${BACKEND_BIND:-0.0.0.0}:${BACKEND_PORT:-31777}:8080"
    networks:
      - app
    # distroless has no shell — no CMD-SHELL healthcheck. We rely on
    # `restart: unless-stopped`. nginx upstream failures will surface as
    # 502, never 500, when the backend is down.
    deploy:
      resources:
        limits:
          cpus: "${BACKEND_CPUS:-2.0}"
          memory: "${BACKEND_MEMORY:-512M}"

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    image: opengovsupport-frontend:latest
    container_name: opengovsupport-frontend
    restart: unless-stopped
    environment:
      PORT: "3000"
      NODE_ENV: "production"
      # next.config.mjs reads BACKEND_URL at *build* time for the rewrite
      # destination. We pass it again at runtime for any server-side fetch
      # in app/lib/api.ts (listFeatures / callFeature on the server).
      BACKEND_URL: "http://backend:8080"
      # Required so Next.js binds 0.0.0.0 inside the container.
      HOSTNAME: "0.0.0.0"
    depends_on:
      - backend
    expose:
      - "3000"
    ports:
      - "${FRONTEND_BIND:-0.0.0.0}:${FRONTEND_PORT:-31778}:3000"
    networks:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "${FRONTEND_CPUS:-1.0}"
          memory: "${FRONTEND_MEMORY:-512M}"

  # ── reverse proxy (opt-in via `--profile proxy`) ───────────────────────
  # Listens on :80 and :443 and dispatches:
  #   /        → frontend:3000   (Next.js SSR + static)
  #   /api/*   → backend:8080    (skips Next.js rewrite — fewer hops, no 500s)
  # Config lives in ./nginx/default.conf; certs in ./nginx/certs/.
  proxy:
    image: nginx:1.27-alpine
    container_name: opengovsupport-proxy
    restart: unless-stopped
    profiles: ["proxy"]
    depends_on:
      - backend
      - frontend
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  app:
    driver: bridge
