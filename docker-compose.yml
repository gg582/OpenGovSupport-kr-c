# Single-host stack: backend + frontend on a shared bridge.
#
# ── Local dev (direct container access) ────────────────────────────────
#   docker compose up -d --build
#   # frontend → http://localhost:31778, backend → http://localhost:31777
#
# ── Public deployment (HTTPS via the bundled nginx) ────────────────────
#   1) Drop fullchain.pem + privkey.pem into ./nginx/certs/
#   2) In .env, set:
#        PUBLIC_DOMAIN=your.domain.example.com
#        BACKEND_BIND=127.0.0.1
#        FRONTEND_BIND=127.0.0.1
#   3) make compose-up-proxy
#
# nginx routes /api/* directly to the backend, / to the frontend.

name: opengovsupport

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    image: opengovsupport-backend:latest
    container_name: opengovsupport-backend
    restart: unless-stopped
    environment:
      PORT: "8080"
      # — runtime tuning (see src/backend/runtime/) —
      POOL_WORKERS: "${POOL_WORKERS:-8}"
      POOL_QUEUE: "${POOL_QUEUE:-4096}"
      POOL_FAST_THRESHOLD: "${POOL_FAST_THRESHOLD:-4096}"
      GOGC_TARGET: "${GOGC_TARGET:-300}"
      GOMAXPROCS: "${GOMAXPROCS:-0}"   # 0 = use container's CPU quota
      JSON_INDENT: "${JSON_INDENT:-0}" # set to "1" in dev for readable JSON
    expose:
      - "8080"
    # Bind address is configurable. Default 0.0.0.0 keeps existing dev
    # behavior; for production behind nginx, set BACKEND_BIND=127.0.0.1
    # in .env so only the proxy can reach the backend.
    ports:
      - "${BACKEND_BIND:-0.0.0.0}:${BACKEND_PORT:-31777}:8080"
    networks:
      - app
    # distroless has no shell — healthcheck omitted; rely on restart: unless-stopped.
    deploy:
      resources:
        limits:
          cpus: "${BACKEND_CPUS:-2.0}"
          memory: "${BACKEND_MEMORY:-512M}"

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: "${BACKEND_URL:-http://backend:8080}"
    image: opengovsupport-frontend:latest
    container_name: opengovsupport-frontend
    restart: unless-stopped
    environment:
      PORT: "3000"
      NODE_ENV: "production"
      BACKEND_URL: "${BACKEND_URL:-http://backend:8080}"
      HOSTNAME: "0.0.0.0"
    depends_on:
      - backend
    expose:
      - "3000"
    ports:
      - "${FRONTEND_BIND:-0.0.0.0}:${FRONTEND_PORT:-31778}:3000"
    networks:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "${FRONTEND_CPUS:-1.0}"
          memory: "${FRONTEND_MEMORY:-512M}"

  # ── reverse proxy (opt-in via `--profile proxy`) ───────────────────────
  # Starts in HTTPS mode when fullchain.pem + privkey.pem exist in ./nginx/certs/,
  # falls back to HTTP-only otherwise. Set PUBLIC_DOMAIN in .env for the server_name.
  proxy:
    image: nginx:1.27-alpine
    container_name: opengovsupport-proxy
    restart: unless-stopped
    profiles: ["proxy"]
    depends_on:
      - backend
      - frontend
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      PUBLIC_DOMAIN: "${PUBLIC_DOMAIN:-_}"
    volumes:
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    networks:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  app:
    driver: bridge
